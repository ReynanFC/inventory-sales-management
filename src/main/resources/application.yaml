spring:
  application:
    name: InventorySalesManagement

  datasource:
    url: jdbc:mysql://localhost:3306/inventory_sales?serverTimezone=UTC
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: none
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    properties:
      hibernate:
        show_sql: true
      open-in-view: false

logging:
    level:
     com.reynan.inventorysalesmanagement: DEBUG